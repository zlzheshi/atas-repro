model:
  name: ViT-B-16
  pretrained: /mnt/t1b6/xuzhejia/checkpoints/open_clip/open_clip_pytorch_model.bin

data:
  global_image_size: 224
  image_size: 960
  mosaic_choices: [6]
  allow_repeat_fill: false
  num_workers: 8

training:
  epochs: 1
  max_steps: 320
  batch_size: 36
  gradient_accumulation_steps: 1
  learning_rate: 0.000005
  weight_decay: 0.05
  temperature: 1.0
  lambda_gld: 0.25
  lambda_lld: 0.01
  lambda_ggd: 4.0
  max_lld_patches: 1024
  amp: true
  log_interval: 10
  save_interval: 1
  output_dir: outputs/atas_vitb_subset_100x200_semantic_guard_320_probe
