model:
  name: ViT-B-16
  pretrained: /mnt/t1b6/xuzhejia/checkpoints/open_clip/open_clip_pytorch_model.bin

data:
  global_image_size: 224
  image_size: 384
  mosaic_choices: [2]
  num_workers: 2

training:
  epochs: 1
  batch_size: 8
  max_steps: 5
  gradient_accumulation_steps: 1
  learning_rate: 0.00001
  weight_decay: 0.1
  temperature: 1.0
  lambda_gld: 1.0
  lambda_lld: 0.01
  lambda_ggd: 1.0
  max_lld_patches: 256
  amp: true
  log_interval: 1
  save_interval: 1
  output_dir: outputs/atas_vitb_debug
